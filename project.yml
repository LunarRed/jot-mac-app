name: Jot
options:
  bundleIdPrefix: com.jot
  deploymentTarget:
    macOS: "13.0"

targets:
  Jot:
    type: application
    platform: macOS
    sources:
      - Sources/Jot
    info:
      path: Sources/Jot/Info.plist
      properties:
        CFBundleDisplayName: Jot
        CFBundleIdentifier: com.jot.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.jot.app
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: Y58J3LFE8R
